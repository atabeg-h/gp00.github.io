<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:linear-gradient(135deg,#ff758c,#ff7eb3,#a18cd1,#fbc2eb);min-height:100vh;}
.hearts{position:fixed;inset:0;overflow:hidden;z-index:-1}
.heart{position:absolute;animation:float 8s linear forwards}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-120px);opacity:0}}
.screen{display:none;min-height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.active{display:flex}
.card{width:100%;max-width:450px;background:rgba(255,255,255,.15);backdrop-filter:blur(15px);padding:30px;border-radius:30px;text-align:center;color:white}
button{border:none;border-radius:40px;padding:14px 30px;cursor:pointer}
.start,.yes{background:white;color:#ff4d88}
.buttons{position:relative;height:260px}
.no{position:absolute;top:140px;left:50%;transform:translateX(-50%);background:#ff4444;color:white}
#screen4{overflow-y:auto;justify-content:flex-start}
.slideshow{width:100%;max-width:900px;height:60vh;min-height:350px;background:black;border-radius:20px;overflow:hidden;position:relative}
.slide{position:absolute;width:100%;height:100%;object-fit:contain;opacity:0;transition:1s}
.activeSlide{opacity:1}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:900px;width:100%;margin-top:20px}
.photo-grid img{width:100%;height:220px;object-fit:contain;background:black;border-radius:15px;cursor:pointer}
@media(min-width:768px){.photo-grid{grid-template-columns:repeat(4,1fr)}}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);justify-content:center;align-items:center;z-index:9999}
.lightbox img{max-width:98vw;max-height:98vh;object-fit:contain}
.close{position:absolute;top:15px;right:25px;color:white;font-size:40px;cursor:pointer}
</style>
</head>
<body>
<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<div class="hearts" id="hearts"></div>

<div class="screen active" id="s1"><div class="card"><h1>Gowumyyy owadanjam? ❤️</h1><br><button class="start" onclick="go1()">Bas üstüne ❤️</button></div></div>

<div class="screen" id="s2"><div class="card"><h1>Bu gün meniňki boljakmyy?? 🥺</h1><div class="buttons"><button class="yes" id="yes" onclick="go2()">Howwa 😉</button><button class="no" id="no">Ýok 😑</button></div></div></div>

<div class="screen" id="s3"><div class="card"><h1>YAAAY ❤️</h1><br><button class="start" onclick="go3()">Saňa sowgat 📸</button></div></div>

<div class="screen" id="s4">
<h1 style="color:white;margin:20px">Suratlar ❤️</h1>
<div class="slideshow">
<img src="pictures/1.jpg" class="slide activeSlide">
<img src="pictures/2.jpg" class="slide">
<img src="pictures/3.jpg" class="slide">
<img src="pictures/4.jpg" class="slide">
<img src="pictures/5.jpg" class="slide">
</div>
<div class="photo-grid" id="gallery"> 
<img src="pictures/6.jpg" onclick="openLb(this.src)">
<img src="pictures/7.jpg" onclick="openLb(this.src)">
<img src="pictures/8.jpg" onclick="openLb(this.src)">
<img src="pictures/9.jpg" onclick="openLb(this.src)">
<img src="pictures/10.jpg" onclick="openLb(this.src)">
<img src="pictures/11.jpg" onclick="openLb(this.src)">
<img src="pictures/12.jpg" onclick="openLb(this.src)">
<img src="pictures/13.jpg" onclick="openLb(this.src)">
<img src="pictures/14.jpg" onclick="openLb(this.src)">
<img src="pictures/15.jpg" onclick="openLb(this.src)">
<img src="pictures/16.jpg" onclick="openLb(this.src)">
<img src="pictures/17.jpg" onclick="openLb(this.src)">
<img src="pictures/18.jpg" onclick="openLb(this.src)">
<img src="pictures/19.jpg" onclick="openLb(this.src)">
<img src="pictures/20.jpg" onclick="openLb(this.src)">
<img src="pictures/21.jpg" onclick="openLb(this.src)">
</div></div>

<div class="lightbox" id="lb" onclick="this.style.display='none'"><span class="close">&times;</span><img id="lbimg"></div>

<script>
setInterval(()=>{let h=document.createElement('div');h.className='heart';h.innerHTML='❤️';h.style.left=Math.random()*100+'%';h.style.fontSize=(15+Math.random()*20)+'px';document.getElementById('hearts').appendChild(h);setTimeout(()=>h.remove(),8000)},300);

function go1(){music.play();s1.classList.remove('active');s2.classList.add('active')}
function go2(){s2.classList.remove('active');s3.classList.add('active')}
function go3(){s3.classList.remove('active');s4.classList.add('active')}

const no=document.getElementById('no');
const area=document.querySelector('.buttons');
const texts=['Ýok 😏','Çyndanammy? 🤨','Pikirlen täzeden 😂','Nädogry jogap 😘','Soňky şans ❤️'];
let tries=0;

function moveNo(){
 tries++;
 if(tries<texts.length) no.innerText=texts[tries];
 const pad=10;
 const maxX=area.clientWidth-no.offsetWidth-pad;
 const maxY=area.clientHeight-no.offsetHeight-pad;
 no.style.left=(Math.random()*maxX)+'px';
 no.style.top=(Math.random()*maxY)+'px';
 no.style.transform='none';
}
no.addEventListener('mouseenter',moveNo);
no.addEventListener('touchstart',e=>{e.preventDefault();moveNo();},{passive:false});

let slides=document.querySelectorAll('.slide'),i=0;
setInterval(()=>{slides[i].classList.remove('activeSlide');i=(i+1)%slides.length;slides[i].classList.add('activeSlide')},3000);

function openLb(src){lb.style.display='flex';lbimg.src=src}
</script>
</body>
</html>
